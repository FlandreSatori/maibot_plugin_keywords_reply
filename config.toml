[plugin]
enabled = true
config_version = "1.1.0"

[permission]
# 允许管理关键词/检测词的用户 ID 列表（platform:user_id 或 纯 user_id 均可）。
# 同时，全局配置 plugin.permission 中的管理员也拥有管理权限。
whitelist = [""]
# 无权限用户执行受限命令时是否发送“权限不足”提示；关闭后静默忽略。
notify_permission_denied = true
# 是否允许普通群成员使用“查看关键词列表”（仅显示当前群已启用的关键词名）。
allow_group_member_list_keywords = false
# 是否允许普通群成员使用“查看检测词列表”（仅显示当前群已启用的检测词名）。
allow_group_member_list_detects = false

[reply]
# 回复时是否引用触发回复的消息。
quote_reply = false
# 是否响应回复消息里的触发词
respond_to_triggers_in_quote = false
# 同一关键词/检测词下有多条回复时，是否以合并转发形式发送全部回复；关闭时随机发送单条回复。
qq_forward_all_replies = false
# 非正则关键词/检测词匹配时是否区分大小写。
case_sensitive = false
# 查看列表命令每页显示的词条数量（避免消息过大）。
list_page_size = 20

[detect]
# 检测词触发冷却时间（秒），0 表示不冷却。
cooldown = 0
# 完全匹配时是否无视冷却时间（仅对非正则检测词生效）。
ignore_cooldown_on_exact_match = false

[template]
# 是否启用回复文本变量模板替换（{user_id} {user_name} {group_id} {self_id} {platform} {message} {date} {time} {datetime}）。
enable_text_template = true

[media_cache]
# 仅对白名单群聊缓存入站富媒体（图片/语音/表情），供引用消息导入与管理命令附图使用。
# 为空时不缓存任何消息，可最大限度降低性能开销；请手动填入需要管理的群号。
group_whitelist = []
